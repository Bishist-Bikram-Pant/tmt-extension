<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator</title>
    <link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Translator</h1>
        </div>

        <!-- Language Selection -->
        <div class="language-section">
            <div class="language-group">
                <label for="sourceLang" class="label">From</label>
                <select id="sourceLang" class="select">
                    <option value="en">English</option>
                    <option value="ne">नेपाली</option>
                    <option value="tmg">तामाङ</option>
                </select>
            </div>

            <button id="swapLangs" class="swap-button" title="Swap languages" aria-label="Swap languages">⇄</button>

            <div class="language-group">
                <label for="targetLang" class="label">To</label>
                <select id="targetLang" class="select">
                    <option value="en">English</option>
                    <option value="ne" selected>नेपाली</option>
                    <option value="tmg">तामाङ</option>
                </select>
            </div>
        </div>

        <!-- Progress Section -->
        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">Translating...</p>
        </div>

        <!-- Messages -->
        <div id="errorMessage" class="message error-message"></div>
        <div id="successMessage" class="message success-message"></div>

        <!-- Action Buttons -->
        <div class="button-section">
            <button id="translateBtn" class="button button-primary">
                Translate
            </button>
            <button id="resetBtn" class="button button-secondary">
                Reset
            </button>
        </div>
    </div>

    <!-- Load config first as global script -->
    <script src="../scripts/config.js"></script>
    <!-- Then load popup controller -->
    <script src="popup.js"></script>
</body>
</html>
